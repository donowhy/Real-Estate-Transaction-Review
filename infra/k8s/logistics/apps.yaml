apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: logistics
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      enableServiceLinks: false
      containers:
        - name: order-service
          image: myservice/order-service:0.1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: logistics-config
            - secretRef:
                name: logistics-secrets
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: JAVA_TOOL_OPTIONS
              value: -Xms64m -Xmx256m
            - name: DB_URL
              value: jdbc:postgresql://logistics-postgres:5432/orderdb
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 40
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: logistics
spec:
  selector:
    app: order-service
  ports:
    - port: 80
      targetPort: 8080
---
