apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: logistics-api
  namespace: logistics
spec:
  ingressClassName: traefik
  rules:
    - host: logistics.local
      http:
        paths:
          - path: /api/v1/orders
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 80
